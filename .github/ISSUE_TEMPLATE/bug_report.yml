name: Bug Report
description: Report a bug to help us improve.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: What steps did you take to encounter the bug?
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected vs. Actual Behavior
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device Firmware Version
      description: If known, please provide the firmware version of your Katana GO.
  - type: textarea
    id: logs
    attributes:
      label: MIDI/SysEx Logs
      description: If relevant, please paste any MIDI logs or raw SysEx data that might help us debug.
